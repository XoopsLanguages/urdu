# .github/workflows/release.yml
# Auto-generated by XoopsCore27 language toolchain
# Re-run: scripts/generate-language-manifests.php

name: Package & Release Language Assets

on:
  push:
    branches: [master, main]
    paths:
      - 'core/**'
      - 'modules/**'
      - 'themes/**'
      - 'manifest.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # ── Discover language name from manifest.json ────────────────────────
      - name: Read manifest
        id: meta
        run: |
          LANG=$(jq -r .language manifest.json)
          echo "lang=$LANG" >> "$GITHUB_OUTPUT"

      # ── Package core 2.7.0 ───────────────────────────────────────────────
      - name: Package core 2.7.0
        if: ${{ hashFiles('core/2.7.0/**') != '' }}
        run: |
          LANG="${{ steps.meta.outputs.lang }}"
          cd core/2.7.0
          zip -r "../../${LANG}-core-2.7.0.zip" htdocs/ install/ upgrade/ \
              --exclude "*.bat" --exclude "*.txt" --exclude "*/.git/*"
          cd ../..
          echo "Packaged ${LANG}-core-2.7.0.zip"

      # ── Package older core versions (EOL — frozen zips) ─────────────────
      - name: Package EOL core versions
        run: |
          LANG="${{ steps.meta.outputs.lang }}"
          for ver_dir in core/*/; do
            ver=$(basename "$ver_dir")
            if [ "$ver" != "2.7.0" ] && [ -d "$ver_dir" ]; then
              zip -r "${LANG}-core-${ver}.zip" "$ver_dir" \
                  --exclude "*.bat" --exclude "*/.git/*" || true
              echo "Packaged ${LANG}-core-${ver}.zip"
            fi
          done

      # ── Package module translations ──────────────────────────────────────
      - name: Package module translations
        run: |
          LANG="${{ steps.meta.outputs.lang }}"
          if [ -d "modules" ]; then
            for mod_dir in modules/*/; do
              mod=$(basename "$mod_dir")
              for ver_dir in "$mod_dir"*/; do
                ver=$(basename "$ver_dir")
                if [ -d "$ver_dir" ]; then
                  zip -r "${LANG}-module-${mod}-${ver}.zip" "$ver_dir" \
                      --exclude "*.bat" --exclude "*/.git/*" || true
                fi
              done
            done
          fi

      # ── Update manifest with current timestamp ───────────────────────────
      - name: Stamp manifest with release date
        run: |
          TODAY=$(date +%Y-%m-%d)
          jq --arg date "$TODAY" --arg ver "2.7.0" '.core[$ver].updated = $date' manifest.json > manifest.tmp
          mv manifest.tmp manifest.json

      # ── Create or update the rolling \'latest\' GitHub Release ─────────────
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: "Latest Language Pack"
          body: |
            Auto-packaged language assets. See manifest.json for coverage details.
            Updated: ${{ github.run_id }}
          files: |
            *.zip
            manifest.json
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
